version: '3.8'

services:
  wg-proxy:
    build: .
    container_name: wg-proxy-container
    restart: always  # 確保開機同 Crash 之後自動重啟
    cap_add:
      - NET_ADMIN    # WireGuard 建立虛擬網卡必需
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1  # 解決 wg-quick 喺 Docker 內常遇嘅 Routing 報錯
    volumes:
      - ./proton.conf:/etc/wireguard/wg0.conf:ro
    ports:
      - "12347:12347/udp"
